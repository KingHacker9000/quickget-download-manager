name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    name: Release Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows (tested)
            experimental: false
          - os: macos-latest
            label: macOS (experimental)
            experimental: true
          - os: ubuntu-22.04
            label: Linux (experimental)
            experimental: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install create-dmg

      - name: Install dependencies
        run: npm ci

      - name: Fetch quickget-agent binary
        run: npm run fetch-agent

      - name: Build Tauri packages
        run: npm run tauri:build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qdm-${{ runner.os }}-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: error

